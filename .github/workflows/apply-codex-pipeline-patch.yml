name: Apply Codex Pipeline Patch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply tested patch
        run: |
          cat .github/codex-patch/part-* > /tmp/codex.patch.gz.b64
          base64 -d /tmp/codex.patch.gz.b64 | gzip -d > /tmp/codex.patch
          git apply --check /tmp/codex.patch
          git apply /tmp/codex.patch
          rm -rf .github/codex-patch .github/workflows/apply-codex-pipeline-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: align video production with dark archive style"
          git push
